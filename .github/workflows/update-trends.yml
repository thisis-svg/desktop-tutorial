name: トレンドデータ毎日更新

on:
  schedule:
    # 毎日 21:00 UTC = 日本時間 朝6:00
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "データ取得のみ(コミット・公開しない)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: サイト公開状態を確認
        run: |
          echo "--- HTTPステータス ---"
          curl -sSI "https://thisis-svg.github.io/desktop-tutorial/" | head -8 || true
          echo "--- 本文冒頭 ---"
          curl -s "https://thisis-svg.github.io/desktop-tutorial/" | head -c 400 || true
          echo ""

      - name: Playwrightをインストール
        run: |
          npm install --no-save --no-package-lock playwright
          npx playwright install --with-deps chromium

      - name: トレンドデータを取得
        run: node scripts/fetch_trends.mjs

      - name: 取得結果を表示
        run: head -c 3000 data/trends.json

      - name: 変更があればコミットしてプッシュ
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -z "$(git status --porcelain -- data/)" ]; then
            echo "変更なし。コミットをスキップします。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: トレンドデータ自動更新 ($(date -u +%Y-%m-%d))"
          git push

      # GITHUB_TOKENによるpushでは他のワークフローが起動しないため、
      # ここでそのままPagesへデプロイする
      - name: Pagesを設定
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 公開ファイルをまとめる
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          mkdir -p _site
          rsync -a --exclude=".git" --exclude=".github" --exclude="_site" \
            --exclude="scripts" --exclude="node_modules" --exclude="package*.json" \
            ./ _site/

      - name: アップロード
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: デプロイ
        if: ${{ github.event.inputs.dry_run != 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4
