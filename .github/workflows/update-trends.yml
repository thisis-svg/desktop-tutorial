name: トレンドデータ毎日更新

on:
  schedule:
    # 毎日 21:00 UTC = 日本時間 朝6:00
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: トレンドデータを取得
        run: python3 scripts/fetch_trends.py

      - name: 変更があればコミットしてプッシュ
        run: |
          if git diff --quiet -- data/trends.json; then
            echo "変更なし。コミットをスキップします。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trends.json
          git commit -m "chore: トレンドデータ自動更新 ($(date -u +%Y-%m-%d))"
          git push
