name: サイト公開(GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pagesを設定(未有効なら自動で有効化)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 公開ファイルをまとめる
        run: |
          mkdir -p _site
          rsync -a --exclude=".git" --exclude=".github" --exclude="_site" \
            --exclude="scripts" --exclude="node_modules" --exclude="package*.json" \
            ./ _site/

      - name: アップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
